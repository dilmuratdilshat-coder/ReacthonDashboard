# ═══════════════════════════════════════════════════════════════════════════════
# КОНФИГУРАЦИЯ ДАШБОРДА ОБОГАТИТЕЛЬНОЙ ФАБРИКИ
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────────
# ПУТИ К ДАННЫМ
# ─────────────────────────────────────────────────────────────────────────────────
data:
  tech_journal: "data/tech_journal.csv"
  downtime: "data/downtime.csv"
  water: "data/water.csv"
  watch_interval: 8  # секунды между проверками изменений файлов

# ─────────────────────────────────────────────────────────────────────────────────
# СМЕНЫ
# ─────────────────────────────────────────────────────────────────────────────────
shifts:
  duration_hours: 12
  shift_1_start: 8   # 08:00 - 20:00
  shift_2_start: 20  # 20:00 - 08:00

# ─────────────────────────────────────────────────────────────────────────────────
# МАППИНГ НАЗВАНИЙ АГРЕГАТОВ (нормализация из разных источников)
# ─────────────────────────────────────────────────────────────────────────────────
aggregates:
  # Активные мельницы (мельница_2 не существует)
  active_mills:
    - "мельница_1"
    - "мельница_3"
    - "мельница_4"
    - "мельница_5"
  
  # Маппинг из downtime в tech_journal
  name_mapping:
    "МШР №1": "мельница_1"
    "МШР №2": "мельница_2"  # не используется
    "МШР №3": "мельница_3"
    "МШЦ №4": "мельница_4"
    "МШР №5": "мельница_5"
    "мшр №1": "мельница_1"
    "мшр №3": "мельница_3"
    "мшц №4": "мельница_4"
    "мшр №5": "мельница_5"

  # Активные классификаторы (2 и 4 не существуют)
  active_classifiers:
    - "классификатор_1"
    - "классификатор_3"
    - "классификатор_5"

# ─────────────────────────────────────────────────────────────────────────────────
# ПОРОГОВЫЕ ЗНАЧЕНИЯ - ПЛОТНОСТЬ (%)
# ─────────────────────────────────────────────────────────────────────────────────
thresholds:
  density:
    # Мельницы: 65-75% = норма (зелёный), остальное = критично (красный)
    мельница_1:
      min: 65
      max: 75
    мельница_3:
      min: 65
      max: 75
    мельница_4:
      min: 65
      max: 75
    мельница_5:
      min: 65
      max: 75
    
    # Классификаторы
    классификатор_1:
      min: 50
      max: 56
    классификатор_3:
      min: 50
      max: 56
    классификатор_5:
      min: 45
      max: 50
    
    # Дефолт для остальных агрегатов
    default:
      min: 60
      max: 75

# ─────────────────────────────────────────────────────────────────────────────────
# ПОРОГОВЫЕ ЗНАЧЕНИЯ - ПРОИЗВОДИТЕЛЬНОСТЬ (т/ч)
# ─────────────────────────────────────────────────────────────────────────────────
  productivity:
    # МШР 1 и 3: 45-40 зелёный, 40-35 жёлтый, <35 красный
    мельница_1:
      green_min: 40
      green_max: 50  # верхняя граница для валидации
      yellow_min: 40 # 35 -> 40 kludge
      critical_below: 35
    мельница_3:
      green_min: 40
      green_max: 50
      yellow_min: 40
      critical_below: 35
    # Остальные мельницы - те же значения (изменить по необходимости)
    мельница_4:
      green_min: 35
      green_max: 40
      yellow_min: 35
      critical_below: 30
    мельница_5:
      green_min: 13
      green_max: 15
      yellow_min: 13
      critical_below: 10
    
    # Плановая производительность (константа, т.к. нет в данных)
    planned_total: 137  # т/ч для всех мельниц суммарно

# ─────────────────────────────────────────────────────────────────────────────────
# ПОРОГОВЫЕ ЗНАЧЕНИЯ - pH
# ─────────────────────────────────────────────────────────────────────────────────
  ph:
    min: 9.5
    max: 10.5
    critical_min: 9.0
    critical_max: 11.0

# ─────────────────────────────────────────────────────────────────────────────────
# ПОРОГОВЫЕ ЗНАЧЕНИЯ - ВОДА
# ─────────────────────────────────────────────────────────────────────────────────
  water:
    # Допустимое отклонение от номинала (%)
    deviation_warning: 20
    deviation_critical: 50

# ─────────────────────────────────────────────────────────────────────────────────
# ДЕТЕКЦИЯ АНОМАЛИЙ
# ─────────────────────────────────────────────────────────────────────────────────
anomaly_detection:
  # Метод: "moving_average" или "zscore"
  # method: "moving_average"
  method: "zscore"
  
  # Параметры скользящей средней
  moving_average:
    window_hours: 24
    warning_deviation: 0.15   # 15% отклонение = предупреждение
    critical_deviation: 0.25  # 25% отклонение = критично
  
  # Параметры Z-score
  zscore:
    window_hours: 72
    warning_threshold: 1.5   # ±2σ = предупреждение
    critical_threshold: 3.0  # ±3σ = критично

# ─────────────────────────────────────────────────────────────────────────────────
# КАТЕГОРИИ ПРОСТОЕВ
# ─────────────────────────────────────────────────────────────────────────────────
downtime:
  categories:
    - "Мех"
    - "Электрик"
    - "Тех"
    - "Другие"
  
  # Цвета для категорий (HEX)
  colors:
    Мех: "#E74C3C"
    Электрик: "#F39C12"
    Тех: "#3498DB"
    Другие: "#95A5A6"

# ─────────────────────────────────────────────────────────────────────────────────
# UI НАСТРОЙКИ
# ─────────────────────────────────────────────────────────────────────────────────
ui:
  # Цветовая схема статусов
  colors:
    ok: "#27AE60"
    warning: "#F39C12"
    critical: "#E74C3C"
    neutral: "#7F8C8D"
    background: "#1a1a2e"
    card_bg: "#16213e"
    text: "#EAECEE"
    text_muted: "#95A5A6"
  
  # Обновление данных
  refresh_interval: 60  # секунды для auto-refresh UI
  
  # Язык
  language: "ru"
